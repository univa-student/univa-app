x-common-env: &common-env
  TZ: ${TZ:-Europe/Kyiv}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-php-env-file: &php-env-file
  env_file:
    - .env
    - ./api/.env

x-php-common: &php-common
  environment:
    <<: *common-env
    PHP_OPCACHE_ENABLE: 0
    COMPOSER_HOME: /var/www/.composer

services:

  # ── NGINX ───────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: ./gateway/docker/development/nginx
      dockerfile: Dockerfile
    container_name: gateway_nginx
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./gateway/docker/development/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${APP_PATH:-./api}:/var/www/app:ro
    depends_on:
      php-fpm:
        condition: service_healthy
      node:
        condition: service_started
    networks:
      - frontend_net
      - dmz_net
    environment:
      <<: *common-env
    logging: *default-logging

  # ── PHP-FPM ─────────────────────────────────────────────────────────────────
  php-fpm:
    build:
      context: ./gateway/docker/development/php-fpm
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: gateway_php_fpm
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - ${APP_PATH:-./api}:/var/www/app:cached
      - ./gateway/docker/development/php-fpm/conf.d/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
      - ./gateway/docker/development/php-fpm/conf.d/timeouts.ini:/usr/local/etc/php/conf.d/98-timeouts.ini:ro
    <<: [ *php-env-file, *php-common ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "FCGI_CONNECT=127.0.0.1:9000 php-fpm-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dmz_net
      - backend_net
    logging: *default-logging

  # ── PHP-CLI — запускается только явно, не стартует вместе со стеком ─────────
  php-cli:
    build:
      context: ./gateway/docker/development/php-cli
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: gateway_php_cli
    restart: "no"
    profiles:
      - tools
    volumes:
      - ${APP_PATH:-./api}:/var/www/app:cached
      - ./gateway/docker/development/php-cli/config:/var/www/.config:cached
      - composer_cache:/var/www/.composer
    <<: [ *php-env-file, *php-common ]
    working_dir: /var/www/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
    stdin_open: true
    tty: true
    logging: *default-logging

  # ── NODE ─────────────────────────────────────────────────────────────────────
  node:
    build:
      context: ./gateway/docker/development/node
      dockerfile: Dockerfile
    container_name: gateway_node
    restart: unless-stopped
    volumes:
      - ${FRONTEND_PATH:-./frontend}:/app:cached
      - node_modules:/app/node_modules
    ports:
      - "127.0.0.1:${NODE_PORT:-5173}:5173"
    env_file:
      - .env
      - ./frontend/.env
    environment:
      <<: *common-env
      # На Linux polling не нужен — переопределите в .env если нужен (macOS/WSL)
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-false}
    networks:
      - frontend_net
    logging: *default-logging

  # ── REDIS ────────────────────────────────────────────────────────────────────
  redis:
    build:
      context: ./gateway/docker/development/redis
      dockerfile: Dockerfile
    container_name: gateway_redis
    restart: unless-stopped
    # Порт открыт только на localhost — снаружи недоступен
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend_net
    logging: *default-logging

  # ── POSTGRESQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16.3-alpine3.20
    container_name: gateway_postgres
    restart: unless-stopped
    # Порт открыт только на localhost — снаружи недоступен
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./gateway/docker/development/postgres/init:/docker-entrypoint-initdb.d:ro
    environment:
      <<: *common-env
      POSTGRES_DB: ${DB_DATABASE:-app}
      POSTGRES_USER: ${DB_USERNAME:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-app} -d ${DB_DATABASE:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend_net
    logging: *default-logging

# ─── ТОМА ────────────────────────────────────────────────────────────────────
volumes:
  redis_data:
  postgres_data:
  composer_cache:
  node_modules:

# ─── СЕТИ ────────────────────────────────────────────────────────────────────
networks:
  # Публичная зона: Nginx + Node/Vite
  frontend_net:
    driver: bridge

  # DMZ: только Nginx ↔ PHP-FPM
  dmz_net:
    driver: bridge

  # Приватная зона: PHP-FPM, Redis, Postgres — Nginx сюда не имеет доступа
  backend_net:
    driver: bridge