name: CI Pipeline

on:
  push:
    branches: [ feature/*, fix/*, develop, main ]
  pull_request:
    branches: [ feature/*, fix/*, develop, main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DB_DATABASE: app_test
  DB_USERNAME: app
  # CI-only БД живёт только во время пайплайна — production-пароль в secrets.DB_PASSWORD_PROD
  DB_PASSWORD: ci_test_password_123

# ─── Общий шаблон переменных БД для шагов ─────────────────────────────────────
# Используется через: env: ${{ env.DB_VARS }} — не поддерживается в YAML,
# поэтому DB-переменные прописываются явно там, где нужны.

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint & Validate
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Validate
    runs-on: self-hosted

    steps:
      - name: Fix workspace permissions (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [ -d "${{ github.workspace }}" ]; then
            docker run --rm -v "${{ github.workspace }}:/workspace" alpine \
              chown -R $(id -u):$(id -g) /workspace 2>/dev/null || true
          fi

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Bootstrap .env files
        shell: bash
        run: |
          cp api/.env.example api/.env

          [ ! -f .env ] && ([ -f .env.example ] && cp .env.example .env || printf 'UID=1000\nGID=1000\n' > .env)

          if [ ! -f frontend/.env ]; then
            [ -f frontend/.env.example ] && cp frontend/.env.example frontend/.env || touch frontend/.env
          fi

      - name: Validate docker-compose syntax
        shell: bash
        run: docker compose config --quiet

      - name: Install hadolint
        shell: bash
        run: |
          HADOLINT_VERSION="v2.12.0"
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64" \
            -o "$HOME/.local/bin/hadolint"
          chmod +x "$HOME/.local/bin/hadolint"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          "$HOME/.local/bin/hadolint" --version

      - name: Lint all Dockerfiles
        shell: bash
        run: |
          FAILED=0
          for f in \
            "gateway/docker/development/nginx/Dockerfile" \
            "gateway/docker/development/php-fpm/Dockerfile" \
            "gateway/docker/development/php-cli/Dockerfile" \
            "gateway/docker/development/node/Dockerfile" \
            "gateway/docker/development/redis/Dockerfile"; do
            echo "── Linting $f"
            hadolint --failure-threshold error "$f" && echo "  ✅ OK" || FAILED=1
          done
          exit $FAILED

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build & Smoke Test
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: 🐳 Docker Build & Smoke Test
    runs-on: self-hosted
    needs: lint

    steps:
      - name: Fix workspace permissions (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [ -d "${{ github.workspace }}" ]; then
            docker run --rm -v "${{ github.workspace }}:/workspace" alpine \
              chown -R $(id -u):$(id -g) /workspace 2>/dev/null || true
          fi

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Bootstrap .env files
        shell: bash
        run: |
          cp api/.env.example api/.env

          [ ! -f .env ] && ([ -f .env.example ] && cp .env.example .env || printf 'UID=1000\nGID=1000\n' > .env)

          if [ ! -f frontend/.env ]; then
            [ -f frontend/.env.example ] && cp frontend/.env.example frontend/.env || touch frontend/.env
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build all images
        shell: bash
        run: docker compose build
        env:
          DOCKER_BUILDKIT: 1
          UID: 1000
          GID: 1000
          DB_DATABASE: ${{ env.DB_DATABASE }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}

      - name: Start postgres & redis
        shell: bash
        run: docker compose up -d postgres redis
        env:
          DB_DATABASE: ${{ env.DB_DATABASE }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}

      - name: Wait for postgres & redis
        shell: bash
        run: |
          for svc in gateway_postgres gateway_redis; do
            echo "Waiting for $svc..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $svc 2>/dev/null || echo "missing")
              echo "  attempt $i: $STATUS"
              [ "$STATUS" = "healthy" ] && echo "✅ $svc healthy" && break
              [ $i -eq 30 ] && echo "❌ $svc not healthy" && docker compose logs $svc && exit 1
              sleep 3
            done
          done

      # ✅ php-cli убран — он в profile=tools и не нужен для smoke-теста
      - name: Start php-fpm, nginx, node
        shell: bash
        run: docker compose up -d php-fpm nginx node
        env:
          UID: 1000
          GID: 1000
          DB_DATABASE: ${{ env.DB_DATABASE }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}

      # ✅ Ждём healthcheck php-fpm — nginx зависит от него через service_healthy
      - name: Wait for php-fpm to be healthy
        shell: bash
        run: |
          echo "Waiting for gateway_php_fpm..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' gateway_php_fpm 2>/dev/null || echo "missing")
            echo "  attempt $i: $STATUS"
            [ "$STATUS" = "healthy" ] && echo "✅ php-fpm is healthy" && break
            [ $i -eq 30 ] && echo "❌ php-fpm did not become healthy" && docker compose logs php-fpm && exit 1
            sleep 3
          done

      - name: Show running containers
        shell: bash
        run: docker compose ps

      - name: Verify no containers have exited
        shell: bash
        run: |
          EXITED=$(docker compose ps --status exited --quiet)
          if [ -n "$EXITED" ]; then
            echo "❌ Containers exited unexpectedly:"
            docker compose ps --status exited
            docker compose logs
            exit 1
          fi
          echo "✅ All containers are running"

      - name: Cleanup
        if: always()
        shell: bash
        run: docker compose down -v

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Backend Tests (PHP / Laravel)
  # ─────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: 🧪 Backend Tests (PHP)
    runs-on: self-hosted
    needs: build

    steps:
      - name: Fix workspace permissions (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [ -d "${{ github.workspace }}" ]; then
            docker run --rm -v "${{ github.workspace }}:/workspace" alpine \
              chown -R $(id -u):$(id -g) /workspace 2>/dev/null || true
          fi

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Bootstrap .env files
        shell: bash
        run: |
          cp api/.env.example api/.env

          [ ! -f .env ] && ([ -f .env.example ] && cp .env.example .env || printf 'UID=1000\nGID=1000\n' > .env)

          if [ ! -f frontend/.env ]; then
            [ -f frontend/.env.example ] && cp frontend/.env.example frontend/.env || touch frontend/.env
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Restore Docker layer cache
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build images
        shell: bash
        run: docker compose build
        env:
          DOCKER_BUILDKIT: 1
          UID: 1000
          GID: 1000

      - name: Start postgres & redis
        shell: bash
        run: docker compose up -d postgres redis
        env:
          DB_DATABASE: ${{ env.DB_DATABASE }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}

      - name: Wait for postgres & redis
        shell: bash
        run: |
          for svc in gateway_postgres gateway_redis; do
            echo "Waiting for $svc..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $svc 2>/dev/null || echo "missing")
              [ "$STATUS" = "healthy" ] && echo "✅ $svc healthy" && break
              [ $i -eq 30 ] && echo "❌ $svc not healthy" && docker compose logs $svc && exit 1
              sleep 3
            done
          done

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ./api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # ✅ Все вызовы php-cli через --profile tools
      - name: Install Composer dependencies
        shell: bash
        run: |
          docker compose --profile tools run --rm php-cli composer install \
            --no-interaction \
            --no-progress \
            --prefer-dist \
            --optimize-autoloader
          if [ ! -f api/vendor/autoload.php ]; then
            echo "❌ vendor/autoload.php not found"
            exit 1
          fi
        env:
          DB_DATABASE: ${{ env.DB_DATABASE }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}

      - name: Generate app key
        shell: bash
        run: docker compose --profile tools run --rm php-cli php artisan key:generate --force
        env:
          DB_DATABASE: ${{ env.DB_DATABASE }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}

      - name: Run database migrations
        shell: bash
        run: docker compose --profile tools run --rm php-cli php artisan migrate --force
        env:
          DB_DATABASE: ${{ env.DB_DATABASE }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}

      - name: Run tests
        shell: bash
        run: docker compose --profile tools run --rm php-cli php artisan test
        env:
          DB_DATABASE: ${{ env.DB_DATABASE }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}

      - name: Cleanup
        if: always()
        shell: bash
        run: docker compose down -v

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4: Frontend Build (Node / Vite)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: 🎨 Frontend Build (Vite)
    runs-on: self-hosted
    needs: lint

    steps:
      - name: Fix workspace permissions (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [ -d "${{ github.workspace }}" ]; then
            docker run --rm -v "${{ github.workspace }}:/workspace" alpine \
              chown -R $(id -u):$(id -g) /workspace 2>/dev/null || true
          fi

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Bootstrap .env files
        shell: bash
        run: |
          [ ! -f .env ] && ([ -f .env.example ] && cp .env.example .env || printf 'UID=1000\nGID=1000\n' > .env)

          if [ ! -f frontend/.env ]; then
            [ -f frontend/.env.example ] && cp frontend/.env.example frontend/.env || touch frontend/.env
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build node image
        shell: bash
        run: docker compose build node
        env:
          DOCKER_BUILDKIT: 1

      - name: Install dependencies & build
        shell: bash
        run: docker compose run --rm --no-deps node sh -c "npm ci && npm run build"

      - name: Cleanup
        if: always()
        shell: bash
        run: docker compose down -v

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 5: Push images to GHCR
  # ─────────────────────────────────────────────────────────────────────────────
  push:
    name: 📦 Push images to GHCR
    runs-on: self-hosted
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/feature/docker' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Fix workspace permissions (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [ -d "${{ github.workspace }}" ]; then
            docker run --rm -v "${{ github.workspace }}:/workspace" alpine \
              chown -R $(id -u):$(id -g) /workspace 2>/dev/null || true
          fi

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Bootstrap .env files
        shell: bash
        run: |
          [ ! -f .env ] && ([ -f .env.example ] && cp .env.example .env || printf 'UID=1000\nGID=1000\n' > .env)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── php-fpm ──────────────────────────────
      - name: Metadata — php-fpm
        id: meta-php
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/php-fpm
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push — php-fpm
        uses: docker/build-push-action@v6
        with:
          context: ./gateway/docker/development/php-fpm
          push: true
          tags: ${{ steps.meta-php.outputs.tags }}
          labels: ${{ steps.meta-php.outputs.labels }}
          build-args: |
            UID=1000
            GID=1000
          # ✅ cache-to/from теперь реально используются
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # ── nginx ────────────────────────────────
      - name: Metadata — nginx
        id: meta-nginx
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/nginx
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push — nginx
        uses: docker/build-push-action@v6
        with:
          context: ./gateway/docker/development/nginx
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # ── node ─────────────────────────────────
      - name: Metadata — node
        id: meta-node
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/node
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push — node
        uses: docker/build-push-action@v6
        with:
          context: ./gateway/docker/development/node
          push: true
          tags: ${{ steps.meta-node.outputs.tags }}
          labels: ${{ steps.meta-node.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # ✅ Ротация кеша — теперь /tmp/.buildx-cache-new реально создаётся выше
      - name: Rotate Docker layer cache
        shell: bash
        run: |
          if [ -d /tmp/.buildx-cache-new ]; then
            rm -rf /tmp/.buildx-cache
            mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          fi